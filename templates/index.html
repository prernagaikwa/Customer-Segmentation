<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Data</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container py-4">

    <h2 class="mb-4 text-center">Customer Data Entry</h2>

    <!-- Buttons -->
    <div class="mb-3">
        <button id="createFile" class="btn btn-primary">Create New File</button>
        <button id="openFile" class="btn btn-secondary">Choose Existing File</button>
    </div>

    <!-- Form -->
    <form id="customerForm">

        <div class="mb-3">
            <label class="form-label">Customer ID</label>
            <input type="text" id="customer_id" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" id="age" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select id="gender" class="form-select" required>
                <option value="" disabled selected>Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Annual Income (₹)</label>
            




            <select id="income" class="form-select" required>
    <option value="" disabled selected>Select Income Range</option>
    <option value="15000">Below ₹20,000</option>
    <option value="35000">₹20,000 - ₹50,000</option>
    <option value="75000">₹50,000 - ₹1,00,000</option>
    <option value="120000">Above ₹1,00,000</option>
</select>





        </div>

        <div class="mb-3">
            <label class="form-label">Spending Score (1-100)</label>
            <input type="number" id="spending_score" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success">Save Data</button>
    </form>

    <!-- Message -->
    <div id="message" class="mt-3 text-success"></div>

    <!-- Navigation -->
    <div class="mt-4">
        <a href="{{ url_for('choosefile') }}" class="btn btn-warning">
            Go to Customer Segmentation
        </a>
    </div>

</div>

<script>
let fileHandle;

// Create file
document.getElementById("createFile").addEventListener("click", async () => {
    try {
        fileHandle = await window.showSaveFilePicker({
            suggestedName: "customer_data.csv",
            types: [{
                description: "CSV file",
                accept: { "text/csv": [".csv"] },
            }],
        });

        const writable = await fileHandle.createWritable();
        await writable.write("Customer ID,Age,Gender,Income,Spending Score\n");
        await writable.close();

        document.getElementById("message").textContent = "File created successfully!";
    } catch (err) {
        console.error(err);
    }
});

// Open file
document.getElementById("openFile").addEventListener("click", async () => {
    try {
        const [handle] = await window.showOpenFilePicker({
            types: [{
                description: "CSV file",
                accept: { "text/csv": [".csv"] },
            }],
        });

        fileHandle = handle;
        document.getElementById("message").textContent = "File opened successfully!";
    } catch (err) {
        console.error(err);
    }
});

// Save data
document.getElementById("customerForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    if (!fileHandle) {
        alert("Please create or open a file first!");
        return;
    }

    const newEntry = [
        document.getElementById("customer_id").value,
        document.getElementById("age").value,
        document.getElementById("gender").value,
        document.getElementById("income").value,
        document.getElementById("spending_score").value
    ].join(",") + "\n";

    try {
        const file = await fileHandle.getFile();
        const existingText = await file.text();

        const writable = await fileHandle.createWritable();
        await writable.write(existingText + newEntry);
        await writable.close();

        document.getElementById("message").textContent = "Data saved successfully!";
        document.getElementById("customerForm").reset();

    } catch (err) {
        console.error(err);
        alert("Error saving data");
    }
});
</script>

</body>
</html>
